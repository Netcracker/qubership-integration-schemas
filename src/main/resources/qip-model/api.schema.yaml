---
$id: http://qubership.org/schemas/product/qip/api.schema.yaml
$schema: http://json-schema.org/draft-07/schema
type: object
allOf:
  - $ref: "http://qubership.org/schemas/product/qip/common-properties/top-level-entity-properties.schema.yaml"
title: Specification Group
properties:
  content:
    type: object
    properties:
      specificationType:
        type: string
        title: API Specification Type
        description: >
          The widely used type of the API defining and documenting approach used to define the certain API
        enum:
          - openapi
          - asyncapi
      specifications:
        type: array
        minItems: 1
        title: Specifications
        description: >
          The array of files containing the API Specification
        items:
          $ref: '#/definitions/specificationResource'
    required:
      - specificationType
      - specifications
definitions:
  specificationResource:
    type: object
    title: Specification Resource
    description: >
      The definition of the API Specification resource file stored in the current package
    properties:
      filePath:
        type: string
        subtype: resourceReference
        title: File Path
        description: >
          The path to the resource file containing the API Specification or its part
    required:
      - filePath
required:
  - content
