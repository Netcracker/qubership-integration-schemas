---
$id: http://qubership.org/schemas/product/qip/element/properties/operation.schema.yaml
$schema: http://json-schema.org/draft-07/schema
type: object
title: Operation properties
oneOf:
  - type: object
    properties:
      integrationOperationProtocolType:
        enum:
          - kafka
          - amqp
      integrationOperationId:
        type: string
        title: Operation ID
      integrationOperationMethod:
        title: AsyncAPI Operation
        $ref: "#/definitions/AsyncMethod"
      integrationOperationPath:
        type: string
        title: AsyncAPI Channel
      integrationOperationAsyncProperties:
        type: object
        title: Operation parameters
        additionalProperties: true
    required:
      - integrationOperationProtocolType
      - integrationOperationId
      - integrationOperationMethod
#      - integrationOperationPath
  - type: object
    properties:
      integrationOperationProtocolType:
        enum:
          - http
          - soap
      integrationOperationId:
        type: string
        title: Operation ID
      integrationOperationMethod:
        title: HTTP Method
        $ref: "#/definitions/HttpMethod"
      integrationOperationPath:
        type: string
        title: Path
      integrationOperationPathParameters:
        type: object
        patternProperties:
          "^.*$":
            type: string
      integrationOperationQueryParameters:
        type: object
        patternProperties:
          "^.*$":
            type: string
      integrationAdditionalParameters:
        type: object
        patternProperties:
          "^.*$":
            type: string
      bodyMimeType:
        type: string
      bodyFormData:
        type: array
        items:
          type: object
          properties:
            fieldName:
              type: string
            mimeType:
              type: string
            name:
              type: string
            value:
              type: string
            fileName:
              type: string
          required:
            - mimeType
            - name
            - value
    required:
      - integrationOperationProtocolType
      - integrationOperationId
      - integrationOperationMethod
      - integrationOperationPath
  - type: object
    properties:
      integrationOperationProtocolType:
        const: grpc
      integrationOperationId:
        type: string
        title: Operation ID
      integrationOperationMethod:
        title: gRPC method
        type: string
      synchronousGrpcCall:
        type: boolean
        default: false
    required:
      - integrationOperationProtocolType
      - integrationOperationId
      - integrationOperationMethod
      - synchronousGrpcCall
  - type: object
    properties:
      integrationOperationProtocolType:
        const: graphql
      integrationGqlOperationName:
        type: string
        title: Operation Name
        description: >
          The query or mutation name.
          Optional if query contains single operation.
      integrationGqlQuery:
        type: string
        title: Query
        description: The query text.
      integrationGqlQueryHeader:
        type: string
        default: CamelGraphQLQuery
        title: Query header
      integrationGqlVariablesHeader:
        type: string
        default: CamelGraphQLVariables
        title: Variables header
      integrationGqlVariablesJSON:
        type: string
        title: Variables JSON
        description: Operation variables in JSON format.
    required:
      - integrationOperationProtocolType
      - integrationGqlQuery
properties:
  integrationSystemId:
    type: string
    title: Service ID
  integrationSpecificationGroupId:
    type: string
    title: Specification group ID
  integrationSpecificationId:
    type: string
    title: Specification ID
  systemType:
    title: Service type
    $ref: "http://qubership.org/schemas/product/qip/common-properties/service-type.schema.yaml"
  integrationOperationProtocolType:
    title: Operation protocol type
    $ref: "#/definitions/Protocol"
required:
  - systemType
  - integrationOperationProtocolType
  - integrationSystemId
  - integrationSpecificationGroupId
  - integrationSpecificationId
definitions:
  Protocol:
    enum:
      - kafka
      - amqp
      - http
      - soap
      - grpc
      - graphql
  HttpMethod:
    enum:
      - POST
      - GET
      - PUT
      - DELETE
      - PATCH
      - HEAD
      - OPTIONS
  AsyncMethod:
    enum:
      - subscribe
      - publish
      - send
      - receive
